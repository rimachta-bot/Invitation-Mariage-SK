<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Invitation de Mariage</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #ffffff 0%, #e2e8f0 100%);
            margin: 0;
            padding: 10px;
            overflow: hidden;
            box-sizing: border-box;
        }
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            perspective: 2000px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 95vw;
            max-width: 420px;
            aspect-ratio: 1 / 1;
            transform: translateY(114px) !important;
            opacity: 0.3;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .envelope-wrapper.ready {
            opacity: 1;
            pointer-events: auto;
        }
       .envelope {
    position: relative;
    width: 100%;
    height: 100%;
    background-color: #ffffff;
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1), 0 0 25px rgba(0, 127, 255, 0.2);
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
}

.envelope-wrapper:hover .envelope {
    transform: translateY(-5px) rotateX(5deg);
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.12), 0 0 35px rgba(0, 127, 255, 0.4);
}

.flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 50% !important;
    background-color: transparent;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0s linear 0.3s, z-index 0.1s step-end;
    z-index: 4;
    border: none !important;
    filter: drop-shadow(0 4px 6px rgba(0, 127, 255, 0.25)); /* Ombre sur le triangle */
}


.envelope-wrapper.open .flap {
    transform: rotateX(180deg);
    background-color: #ffffff;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.03);
    z-index: 1;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0s linear 0.3s, z-index 0.1s step-end 0.3s;
    /* Ajustement de l'ombre lorsque le triangle est retourné vers le haut */
    filter: drop-shadow(0 -4px 8px rgba(0, 127, 255, 0.2));
}
 .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1), 0 0 25px rgba(0, 127, 255, 0.2);
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            overflow: hidden;
        }
        .envelope.reveal-card {
            overflow: visible !important;
        }
        .envelope-wrapper:hover .envelope {
            transform: translateY(-5px) rotateX(5deg);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.12), 0 0 35px rgba(0, 127, 255, 0.3);
        }
        .envelope-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
            z-index: 1;
        }
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 50% !important;
            background-color: transparent;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0s linear 0.3s, z-index 0.1s step-end;
            z-index: 4;
            border: none !important;
        }
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            background-color: #ffffff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.03);
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0s linear 0.3s, z-index 0.1s step-end 0.3s;
        }
        .front-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff !important;
            z-index: 3;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.03), inset 0 0 0 3px rgba(255,255,255,1), inset 0 0 0 4px rgba(0,0,0,0.02);
        }
        .envelope-art {
            width: 100%;
            height: 65%;
            overflow: hidden;
            position: relative;
            background-color: #ffffff;
            clip-path: inset(0 0 0 0);
        }
        .envelope-art img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top center;
        }
        .recipient-box {
            position: absolute;
            bottom: 4%;
            left: 50%;
            width: 92%;
            transform: translateX(-50%) !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            z-index: 5;
        }
.recipient-name-text {
    font-family: "Amiri", "Traditional Arabic", "Urdu Typesetting", serif !important;
    font-weight: 400 !important;
    font-size: 6.2vw !important;
    color: #10069F !important;
    direction: rtl;
    text-align: center !important;
    display: block !important;
    margin: 0 auto 8px auto !important; /* Ajoute 8px de marge en bas pour pousser le bloc vers le haut de 2 mm */
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    max-width: 88% !important;
    border-bottom: 1px dotted #10069F;
    padding-bottom: 2px !important;
    width: 100%;
    box-sizing: border-box !important;
}

@media (min-width: 420px) {
    .recipient-name-text {
        font-size: 25px !important;
    }
}


        .buttons-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 2px;
            box-sizing: border-box;
            gap: 4px;
        }
        .card {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 2;
            opacity: 0;
            visibility: hidden;
            box-shadow: 0 0 0 rgba(0, 0, 0, 0);
            display: flex;
            flex-direction: column;
            will-change: transform, opacity;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s linear 0.4s, visibility 0s linear 1.2s;
        }
        .card-image-part {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .card-image-part img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .envelope-wrapper.open .card {
            opacity: 1 !important;
            visibility: visible !important;
            transform: translateY(-100%);
            z-index: 2;
            transition: transform 1.6s cubic-bezier(0.25, 1, 0.5, 1) 0.5s, opacity 0.1s linear 0.5s, visibility 0s linear 0.5s;
        }
        .envelope-wrapper.open .card.settle {
            z-index: 5 !important;
            transform: translateY(-28%);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12), 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.5s ease;
        }
        .action-btn {
            opacity: 0;
            visibility: hidden;
            transform: translateY(5px);
            transition: opacity 0.4s ease, transform 0.4s ease, background-color 0.2s, border-color 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            white-space: nowrap;
        }
    .maps-btn, .calendar-btn, .audio-btn {
    background-color: #ffffff;
    color: #10069F !important; /* Texte des boutons en Pantone 072 C */
    border: 1px solid #cbd5e1;
    padding: 6px 12px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 11px;
    font-weight: 600;
    border-radius: 15px;
    cursor: pointer !important;
    display: inline-flex !important; /* Force l'alignement en ligne */
    align-items: center !important;
    justify-content: center !important;
    gap: 6px; /* Espace fixe entre icône et texte */
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    white-space: nowrap !important; /* Empêche strictement le retour à la ligne du texte */
    flex-wrap: nowrap !important; /* Empêche l'icône de sauter à la ligne */
}

.maps-btn:hover, .calendar-btn:hover, .audio-btn:hover {
    background-color: #f8fafc;
    border-color: #10069F !important;
}

.maps-btn svg, .audio-btn svg {
    width: 14px;
    height: 14px;
    display: inline-block !important;
    flex-shrink: 0 !important; /* Empêche l'icône de se déformer ou rétrécir */
}

/* Force la couleur Pantone 072 C sur les tracés SVG internes des icônes */
.maps-btn svg path, .audio-btn svg path {
    fill: #10069F !important;
}

.action-btn.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

    </style>
</head>
<body>
    <audio id="bgMusic" loop preload="auto">
        <source src="https://files.catbox.moe/owgvs1.mp3" type="audio/mpeg">
    </audio>
    <div class="envelope-wrapper" id="envelopeContainer">
        <div class="envelope" id="envelopeBody">
            <div class="envelope-back"></div>
            <div class="flap"></div>
            <div class="card">
                <div class="card-image-part">
                    <img src="https://i.ibb.co/3mbv4H1j/S-K-Invitation.png" alt="Invitation Mariage" id="invitationImg">
                </div>
            </div>
            <div class="front-face">
                <div class="envelope-art">
                    <img src="https://i.ibb.co/Z1GHFQjQ/enveloppe-1.jpg" alt="Illustration Cote Gammarth">
                </div>
                <div class="recipient-box">
                    <div id="recipientName" class="recipient-name-text"> </div>
                    <div class="buttons-row">
                        <button class="action-btn maps-btn" id="mapsButton">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#EA4335"/>
                            </svg> Google Maps
                        </button>
                        <button class="action-btn audio-btn" id="audioButton">
                            <svg viewBox="0 0 24 24" id="audioIcon">
                                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="#2c3e50"/>
                            </svg><span id="audioText">Mute</span>
                        </button>
                        <button class="action-btn calendar-btn" id="calendarBtn">📅 Calendrier</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const wrapper = document.getElementById('envelopeContainer');
        const envelopeBody = document.getElementById('envelopeBody');
        const card = document.querySelector('.card');
        const img = document.getElementById('invitationImg');
        const mapsButton = document.getElementById('mapsButton');
        const audioButton = document.getElementById('audioButton');
        const audioIcon = document.getElementById('audioIcon');
        const audioText = document.getElementById('audioText');
        const recipientElement = document.getElementById('recipientName');
        const calendarButton = document.getElementById('calendarBtn');
        const audio = document.getElementById('bgMusic');
        audio.volume = 0.3;

        try {
            const currentUrl = window.location.href;
            const urlParams = new URLSearchParams(window.location.search || currentUrl.split('?'));
            let guestName = urlParams.get('nom');
            if (!guestName && window.top !== window) {
                const topUrl = window.top.location.href;
                const topParams = new URLSearchParams(topUrl.split('?'));
                guestName = topParams.get('nom');
            }
            if (guestName) {
                const decodedName = decodeURIComponent(guestName);
                recipientElement.innerText = " " + decodedName.replace(/_/g, ' ');
            }
        } catch(e) {
            console.log("Erreur URL");
        }

        function activateEnvelope() {
            wrapper.classList.add('ready');
        }
        if (img.complete) {
            activateEnvelope();
        } else {
            img.addEventListener('load', activateEnvelope);
        }

        wrapper.addEventListener('click', (event) => {
            if (event.target === mapsButton || event.target === calendarButton || event.target.closest('#audioButton')) return;
            if (!wrapper.classList.contains('open')) {
                wrapper.classList.add('open');
                audio.currentTime = 0;
                audio.play().catch(err => console.log("Attente action :", err));
                setTimeout(() => { envelopeBody.classList.add('reveal-card'); }, 400);
                setTimeout(() => { card.classList.add('settle'); }, 2100);
                setTimeout(() => {
                    mapsButton.classList.add('show');
                    audioButton.classList.add('show');
                    calendarButton.classList.add('show');
                }, 2500);
            } else {
                mapsButton.classList.remove('show');
                audioButton.classList.remove('show');
                calendarButton.classList.remove('show');
                card.classList.remove('settle');
                audio.pause();
                audio.muted = false;
                audioText.innerText = "Mute";
                audioIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="#10069F"/>';

                setTimeout(() => {
                    wrapper.classList.remove('open');
                    envelopeBody.classList.remove('reveal-card');
                }, 200);
            }
        });

        audioButton.addEventListener('click', (event) => {
            event.stopPropagation();
            if (audio.muted) {
                audio.muted = false;
                audioText.innerText = "Mute";
                audioIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="#2c3e50"/>';
            } else {
                audio.muted = true;
                audioText.innerText = "Play";
                audioIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" fill="#2c3e50"/>';
            }
        });

        mapsButton.addEventListener('click', (event) => {
            event.stopPropagation();
            window.open("https://maps.app.goo.gl/fRxRzG4eXCShHXqs9", '_blank');
        });

        calendarButton.addEventListener('click', (e) => {
            e.stopPropagation();
            const icsContent = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "BEGIN:VEVENT",
                "UID:" + Date.now() + "@mariage.com",
                "DTSTAMP:20260517T120000Z",
                "DTSTART:20260822T173000Z",
                "DTEND:20260822T200000Z",
                "SUMMARY:Mariage de Sami & Khadija 💍",
                "DESCRIPTION:Célébration du mariage à l'hôtel Golden Carthage Gammarth.",
                "LOCATION:Golden Carthage Gammarth, Tunisie",
                "END:VEVENT",
                "END:VCALENDAR"
            ].join("\r\n");
            const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute("download", "Mariage_Sami_Khadija.ics");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
